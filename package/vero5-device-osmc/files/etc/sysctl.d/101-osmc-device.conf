# OSMC device specific sysctl configuration
# Do not modify: define overrides in /etc/sysctl.d with a higher weighting

vm.min_free_kbytes=65536
vm.swappiness=10
kernel.panic=5
# Turn the lockup detectors into panics so a silent kernel hang reboots
# and leaves a ramoops, instead of wedging until a power cycle.
kernel.hardlockup_panic=1
kernel.softlockup_panic=1
kernel.panic_on_oops=1
